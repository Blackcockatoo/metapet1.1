<svg width="1200" height="1200" viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="60%" fx="50%" fy="42%">
      <stop offset="0%" stop-color="#1B1440"/>
      <stop offset="45%" stop-color="#0E0B24"/>
      <stop offset="100%" stop-color="#05060D"/>
    </radialGradient>

    <linearGradient id="goldLine" x1="240" y1="200" x2="960" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8E7A1"/>
      <stop offset="25%" stop-color="#E7C96B"/>
      <stop offset="50%" stop-color="#FFF1B8"/>
      <stop offset="75%" stop-color="#C99B2E"/>
      <stop offset="100%" stop-color="#F3D87A"/>
    </linearGradient>

    <linearGradient id="gemGlow" x1="470" y1="420" x2="730" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7CF7FF"/>
      <stop offset="50%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#7B3CFF"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%" filterUnits="objectBoundingBox" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <path id="necklaceArc" d="M300 300C385 205 485 160 600 160C715 160 815 205 900 300"/>
    <path id="innerArc" d="M350 340C425 260 508 222 600 222C692 222 775 260 850 340"/>
