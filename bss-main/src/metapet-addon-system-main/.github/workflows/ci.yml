name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-critical-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test_file:
          - tests/integration/mint-to-store.test.ts
          - tests/unit/addon-store-db-adapter.test.ts
          - tests/unit/mint-service.test.ts
          - tests/unit/transfer-service.test.ts
          - tests/unit/verify-service.test.ts

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run security-critical test subset
        run: pnpm vitest run ${{ matrix.test_file }}

  verify:
    runs-on: ubuntu-latest
    needs: security-critical-tests

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build web app
        run: pnpm build
